name: PetKit Now (ShopSmart) CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Server - Install & Migrate
        run: |
          cd server
          npm install
          npx prisma generate
          npm test

      - name: Client - Install & Test
        run: |
          cd client
          npm install
          npm test -- --run

      - name: Build Docker Image
        run: |
          cd server
          docker build -t petkit-backend .

name: PetKit workflow

on: [push]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Build Server Docker Image
        run: docker build -t server-app ./server

      - name: Run Server Container
        run: docker run -d server-app
        
      - name: Run script
        run: ./run.sh
